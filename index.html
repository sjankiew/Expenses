<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Modern Enterprise Typography & Utilities */
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        :root {
            --color-primary: #6FD1D7;
            --color-primary-dark: #58b6bc;
            --color-bg: #E5EEE4;
        }

        body {
            /* Fallback to Sarabun for Thai support, mimicking Aptos clean look */
            font-family: 'Aptos', 'Sarabun', sans-serif; 
            background-color: var(--color-bg);
            -webkit-tap-highlight-color: transparent;
        }

        .bg-custom-primary { background-color: var(--color-primary); }
        .text-custom-primary { color: var(--color-primary-dark); }
        .border-custom-primary { border-color: var(--color-primary); }
        .focus-ring-primary:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(111, 209, 215, 0.3); }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Smooth SPA transition */
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Numpad Styles */
        .numpad-btn {
            background-color: #f3f4f6; border-radius: 0.5rem; padding: 1rem;
            font-size: 1.25rem; font-weight: 600; color: #374151; transition: all 0.1s;
        }
        .numpad-btn:active { background-color: #e5e7eb; transform: scale(0.95); }
        .numpad-action { background-color: var(--color-primary); color: white; }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <!-- Sidebar (Desktop & Mobile) -->
    <aside class="bg-white w-64 border-r border-gray-200 flex-shrink-0 hidden md:flex flex-col h-full shadow-sm z-20">
        <div class="p-6 border-b border-gray-100 flex items-center space-x-3">
            <div class="p-2 bg-custom-primary rounded-lg text-white">
                <i data-lucide="wallet"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800">FinanceApp</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="navigate('record')" id="nav-record" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-[#E5EEE4]/50 text-custom-primary font-semibold transition-colors">
                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                <span>บันทึกรายการ</span>
            </button>
            <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 font-medium transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>แดชบอร์ด</span>
            </button>
            <button onclick="navigate('settings')" id="nav-settings" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 font-medium transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>จัดการหมวดหมู่</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full relative w-full overflow-hidden">
        
        <!-- Mobile Header -->
        <header class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between z-20 shadow-sm">
            <div class="flex items-center space-x-2 text-gray-800 font-bold">
                <i data-lucide="wallet" class="text-custom-primary"></i>
                <span>FinanceApp</span>
            </div>
            <button class="text-gray-500" onclick="alert('เมนูบนมือถือ (คุณสามารถเพิ่ม Drawer UI ได้ที่นี่)')">
                <i data-lucide="menu"></i>
            </button>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-32 no-scrollbar" id="main-scroll">
            
            <!-- 🟢 MODULE 1: Record Form -->
            <section id="view-record" class="view-section active max-w-2xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    
                    <!-- Type Toggle -->
                    <div class="flex p-2 bg-gray-50 border-b border-gray-100">
                        <button id="typeExpense" onclick="setType('Expense')" class="flex-1 py-2 rounded-xl bg-white shadow-sm font-semibold text-gray-800 transition-all">รายจ่าย</button>
                        <button id="typeIncome" onclick="setType('Income')" class="flex-1 py-2 rounded-xl text-gray-500 font-medium transition-all">รายรับ</button>
                    </div>

                    <div class="p-6 space-y-5">
                        <!-- Date -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">วันที่</label>
                            <input type="date" id="inputDate" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus-ring-primary text-gray-800">
                        </div>

                        <!-- Payment Method (Only Expense) -->
                        <div id="paymentMethodContainer">
                            <label class="block text-sm font-medium text-gray-600 mb-1">ช่องทางชำระเงิน</label>
                            <select id="inputPayment" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus-ring-primary text-gray-800 appearance-none">
                                <option value="Cash" selected>เงินสด</option>
                                <option value="Credit Card">บัตรเครดิต</option>
                            </select>
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">หมวดหมู่</label>
                            <select id="inputCategory" onchange="checkCategory()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus-ring-primary text-gray-800 appearance-none">
                                <option value="" disabled selected>โหลดข้อมูล...</option>
                            </select>
                        </div>

                        <!-- Standard Amount Input -->
                        <div id="standardAmountContainer">
                            <label class="block text-sm font-medium text-gray-600 mb-1">ยอดเงิน (บาท)</label>
                            <input type="number" id="inputAmount" placeholder="0.00" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus-ring-primary text-2xl font-bold text-gray-800 text-right">
                        </div>

                        <!-- 💡 Special Feature: Food Multi-Amount -->
                        <div id="foodAmountContainer" class="hidden border border-gray-200 rounded-xl p-4 bg-gray-50">
                            <div class="flex justify-between items-center mb-3">
                                <label class="text-sm font-semibold text-gray-600 flex items-center"><i data-lucide="utensils" class="w-4 h-4 mr-1"></i> แจกแจงยอดค่าอาหาร</label>
                                <div class="text-xl font-bold text-custom-primary">รวม: <span id="foodTotalDisplay">0</span></div>
                            </div>
                            
                            <!-- Input List -->
                            <div id="foodInputsList" class="flex overflow-x-auto space-x-2 pb-2 no-scrollbar">
                                <input type="number" readonly class="food-input w-24 flex-shrink-0 p-3 text-center rounded-lg border-2 border-custom-primary bg-white font-bold" value="">
                            </div>

                            <!-- Custom Numpad -->
                            <div class="grid grid-cols-4 gap-2 mt-4">
                                <button onclick="numpadPress('7')" class="numpad-btn">7</button>
                                <button onclick="numpadPress('8')" class="numpad-btn">8</button>
                                <button onclick="numpadPress('9')" class="numpad-btn">9</button>
                                <button onclick="numpadPress('DEL')" class="numpad-btn bg-red-100 text-red-600"><i data-lucide="delete" class="mx-auto"></i></button>
                                
                                <button onclick="numpadPress('4')" class="numpad-btn">4</button>
                                <button onclick="numpadPress('5')" class="numpad-btn">5</button>
                                <button onclick="numpadPress('6')" class="numpad-btn">6</button>
                                <button onclick="numpadPress('NEXT')" class="numpad-btn numpad-action row-span-2 shadow-md"><i data-lucide="arrow-right" class="mx-auto w-8 h-8"></i></button>
                                
                                <button onclick="numpadPress('1')" class="numpad-btn">1</button>
                                <button onclick="numpadPress('2')" class="numpad-btn">2</button>
                                <button onclick="numpadPress('3')" class="numpad-btn">3</button>
                                
                                <button onclick="numpadPress('0')" class="numpad-btn col-span-2">0</button>
                                <button onclick="numpadPress('.')" class="numpad-btn">.</button>
                            </div>
                        </div>

                        <!-- Note -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">หมายเหตุ</label>
                            <textarea id="inputNote" rows="2" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus-ring-primary text-gray-800" placeholder="เพิ่มรายละเอียด..."></textarea>
                        </div>

                        <!-- Image Upload -->
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">แนบสลิป/รูปภาพ</label>
                            <input type="file" id="inputFile" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-custom-primary file:text-white hover:file:bg-[#58b6bc] transition-all">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 🟢 MODULE 2: Dashboard -->
            <section id="view-dashboard" class="view-section max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">ภาพรวมบัญชี</h2>
                    <select id="dashFilter" onchange="renderDashboard()" class="p-2 border border-gray-200 rounded-lg text-sm bg-white">
                        <option value="daily">รายวัน</option>
                        <option value="monthly">รายเดือน</option>
                        <option value="yearly">รายปี</option>
                    </select>
                </div>

                <!-- Summary Cards -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-sm text-gray-500 mb-1">รายรับรวม</div>
                        <div class="text-2xl font-bold text-green-500" id="dashIncome">฿0.00</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-sm text-gray-500 mb-1">รายจ่ายรวม</div>
                        <div class="text-2xl font-bold text-red-500" id="dashExpense">฿0.00</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-custom-primary col-span-2 md:col-span-1">
                        <div class="text-sm text-gray-500 mb-1">คงเหลือ</div>
                        <div class="text-2xl font-bold text-gray-800" id="dashBalance">฿0.00</div>
                    </div>
                </div>

                <!-- Categories Breakdown -->
                <h3 class="text-lg font-bold text-gray-800 mb-3">สรุปรายจ่ายตามหมวดหมู่</h3>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4" id="dashCategories">
                    <!-- Dynamic Content -->
                    <div class="text-center text-gray-400 py-4">กำลังโหลดข้อมูล...</div>
                </div>
            </section>

            <!-- 🟢 MODULE 3: Settings (Categories) -->
            <section id="view-settings" class="view-section max-w-2xl mx-auto">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">จัดการหมวดหมู่</h2>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">เพิ่มหมวดหมู่ใหม่</h3>
                    <div class="flex space-x-3">
                        <select id="newCatType" class="p-3 bg-gray-50 border border-gray-200 rounded-xl">
                            <option value="Expense">รายจ่าย</option>
                            <option value="Income">รายรับ</option>
                        </select>
                        <input type="text" id="newCatName" placeholder="ชื่อหมวดหมู่..." class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl">
                        <button onclick="saveCategory()" class="bg-custom-primary text-white px-5 py-3 rounded-xl font-bold hover:bg-[#58b6bc] transition-colors">เพิ่ม</button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-semibold mb-4">รายการหมวดหมู่</h3>
                    <ul id="settingCatList" class="space-y-2">
                        <!-- Dynamic Content -->
                    </ul>
                </div>
            </section>

        </div>

        <!-- Sticky Footer for Record Mode -->
        <div id="stickyFooter" class="absolute bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-200 z-30 transition-transform transform translate-y-0">
            <button onclick="submitData()" id="btnSave" class="w-full max-w-2xl mx-auto block bg-custom-primary hover:bg-[#58b6bc] text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-teal-500/30 transition-all flex justify-center items-center">
                <i data-lucide="save" class="mr-2"></i> บันทึกข้อมูล
            </button>
        </div>

    </main>

    <!-- Overlay Loader -->
    <div id="loader" class="fixed inset-0 bg-white/70 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <i data-lucide="loader-2" class="animate-spin w-12 h-12 text-custom-primary mb-4"></i>
        <span class="font-semibold text-gray-600" id="loaderText">กำลังประมวลผล...</span>
    </div>

    <script>
        // ==========================================
        // ⚙️ CONFIG & STATE
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwxRRohEC8ygLsDs4nkm5yJHMZBl4OCxif-vqR6fEdqowoAk-z6iWNPY4HFdN5n0ZX5/exec'; // ⚠️ นำ URL จาก GAS มาวางที่นี่
        
        let currentState = {
            view: 'record',
            type: 'Expense',
            categories: [],
            foodAmounts: [''],
            foodActiveIndex: 0,
            transactions: []
        };

        // Initialize Icons
        lucide.createIcons();
        document.getElementById('inputDate').valueAsDate = new Date();

        // ==========================================
        // 🔄 SPA NAVIGATION LOGIC
        // ==========================================
        function navigate(viewId) {
            currentState.view = viewId;
            
            // Toggle Views
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            // Toggle Nav Active state
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-[#E5EEE4]/50', 'text-custom-primary');
                el.classList.add('text-gray-500');
            });
            const activeNav = document.getElementById(`nav-${viewId}`);
            if(activeNav) {
                activeNav.classList.remove('text-gray-500');
                activeNav.classList.add('bg-[#E5EEE4]/50', 'text-custom-primary');
            }

            // Sticky Footer Visibility
            const footer = document.getElementById('stickyFooter');
            if(viewId === 'record') {
                footer.style.transform = 'translateY(0)';
                document.getElementById('main-scroll').classList.add('pb-32');
            } else {
                footer.style.transform = 'translateY(100%)';
                document.getElementById('main-scroll').classList.remove('pb-32');
            }

            // Load specific data on navigate
            if(viewId === 'dashboard') loadDashboard();
        }

        // ==========================================
        // 📝 RECORD FORM LOGIC
        // ==========================================
        function setType(type) {
            currentState.type = type;
            const btnExp = document.getElementById('typeExpense');
            const btnInc = document.getElementById('typeIncome');
            
            if(type === 'Expense') {
                btnExp.className = 'flex-1 py-2 rounded-xl bg-white shadow-sm font-semibold text-gray-800 transition-all';
                btnInc.className = 'flex-1 py-2 rounded-xl text-gray-500 font-medium transition-all';
                document.getElementById('paymentMethodContainer').style.display = 'block';
            } else {
                btnInc.className = 'flex-1 py-2 rounded-xl bg-white shadow-sm font-semibold text-gray-800 transition-all';
                btnExp.className = 'flex-1 py-2 rounded-xl text-gray-500 font-medium transition-all';
                document.getElementById('paymentMethodContainer').style.display = 'none';
            }
            populateCategories();
            checkCategory();
        }

        async function fetchCategories() {
            try {
                // Mockup if API not set
                if(API_URL === 'YOUR_GAS_WEB_APP_URL') {
                    currentState.categories = [
                        {Name: 'อาหาร', Type: 'Expense'}, {Name: 'ออกกำลังกาย', Type: 'Expense'}, 
                        {Name: 'รถ', Type: 'Expense'}, {Name: 'เงินเดือน', Type: 'Income'}
                    ];
                    populateCategories();
                    return;
                }

                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getCategories' })
                });
                const data = await res.json();
                currentState.categories = data.data;
                populateCategories();
                renderCategorySettings();
            } catch (e) {
                console.error('Failed to load categories', e);
            }
        }

        function populateCategories() {
            const select = document.getElementById('inputCategory');
            select.innerHTML = '<option value="" disabled selected>เลือกหมวดหมู่</option>';
            
            const filtered = currentState.categories.filter(c => c.Type === currentState.type);
            filtered.forEach(c => {
                select.innerHTML += `<option value="${c.Name}">${c.Name}</option>`;
            });
        }

        // 💡 Complex Logic: Food Numpad handling
        function checkCategory() {
            const cat = document.getElementById('inputCategory').value;
            const standard = document.getElementById('standardAmountContainer');
            const food = document.getElementById('foodAmountContainer');

            if(cat === 'อาหาร') {
                standard.classList.add('hidden');
                food.classList.remove('hidden');
                renderFoodInputs();
            } else {
                standard.classList.remove('hidden');
                food.classList.add('hidden');
            }
        }

        function renderFoodInputs() {
            const list = document.getElementById('foodInputsList');
            list.innerHTML = '';
            let total = 0;

            currentState.foodAmounts.forEach((amt, index) => {
                const isActive = index === currentState.foodActiveIndex;
                const borderClass = isActive ? 'border-custom-primary' : 'border-gray-200';
                const bgClass = isActive ? 'bg-white' : 'bg-gray-100';
                
                list.innerHTML += `<input type="text" readonly onclick="setActiveFoodIndex(${index})" class="food-input w-24 flex-shrink-0 p-3 text-center rounded-lg border-2 ${borderClass} ${bgClass} font-bold text-gray-800 cursor-pointer" value="${amt}">`;
                
                total += parseFloat(amt || 0);
            });

            document.getElementById('foodTotalDisplay').innerText = total.toFixed(2);
            // Scroll to end automatically
            list.scrollLeft = list.scrollWidth;
        }

        function setActiveFoodIndex(index) {
            currentState.foodActiveIndex = index;
            renderFoodInputs();
        }

        function numpadPress(key) {
            let currentStr = currentState.foodAmounts[currentState.foodActiveIndex].toString();

            if (key === 'DEL') {
                currentState.foodAmounts[currentState.foodActiveIndex] = currentStr.slice(0, -1);
            } else if (key === 'NEXT') {
                // If current is not empty, add new slot
                if(currentStr !== '') {
                    currentState.foodAmounts.push('');
                    currentState.foodActiveIndex = currentState.foodAmounts.length - 1;
                }
            } else {
                // Check decimals limit
                if (key === '.' && currentStr.includes('.')) return;
                currentState.foodAmounts[currentState.foodActiveIndex] = currentStr + key;
            }
            renderFoodInputs();
        }

        // ==========================================
        // 📤 SUBMIT DATA & UPLOAD
        // ==========================================
        async function submitData() {
            if(API_URL === 'YOUR_GAS_WEB_APP_URL') {
                alert("กรุณาใส่ URL ของ Google Apps Script ในโค้ดก่อนใช้งานจริง");
                return;
            }

            const category = document.getElementById('inputCategory').value;
            let finalAmount = 0;

            if(!category) return alert('กรุณาเลือกหมวดหมู่');

            if(category === 'อาหาร') {
                finalAmount = currentState.foodAmounts.reduce((sum, val) => sum + parseFloat(val || 0), 0);
                if(finalAmount <= 0) return alert('กรุณาใส่ยอดเงินอาหาร');
            } else {
                finalAmount = parseFloat(document.getElementById('inputAmount').value);
                if(isNaN(finalAmount) || finalAmount <= 0) return alert('กรุณาใส่ยอดเงิน');
            }

            const fileInput = document.getElementById('inputFile');
            let base64File = null;
            let fileName = null;

            showLoader('กำลังบันทึกข้อมูล...');

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName = file.name;
                base64File = await toBase64(file);
            }

            const payload = {
                date: document.getElementById('inputDate').value,
                type: currentState.type,
                paymentMethod: currentState.type === 'Expense' ? document.getElementById('inputPayment').value : '-',
                category: category,
                amount: finalAmount,
                note: document.getElementById('inputNote').value,
                imageBase64: base64File,
                imageName: fileName
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'saveTransaction', payload: payload })
                });
                const data = await res.json();
                
                if(data.status === 'success') {
                    alert('บันทึกสำเร็จ!');
                    resetForm();
                } else {
                    alert('เกิดข้อผิดพลาด: ' + data.message);
                }
            } catch (e) {
                alert('Connection Error');
            } finally {
                hideLoader();
            }
        }

        function resetForm() {
            document.getElementById('inputAmount').value = '';
            document.getElementById('inputNote').value = '';
            document.getElementById('inputFile').value = '';
            currentState.foodAmounts = [''];
            currentState.foodActiveIndex = 0;
            renderFoodInputs();
        }

        // ==========================================
        // 📊 DASHBOARD & SETTINGS
        // ==========================================
        async function loadDashboard() {
            if(API_URL === 'YOUR_GAS_WEB_APP_URL') return;
            showLoader('กำลังดึงข้อมูล...');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getDashboardData' })
                });
                const data = await res.json();
                currentState.transactions = data.data;
                renderDashboard();
            } catch (e) {
                console.error(e);
            } finally {
                hideLoader();
            }
        }

        function renderDashboard() {
            const filter = document.getElementById('dashFilter').value;
            const today = new Date();
            let filteredTx = [];

            // Simple client-side filtering
            filteredTx = currentState.transactions.filter(tx => {
                const txDate = new Date(tx.Date);
                if(filter === 'daily') return txDate.toDateString() === today.toDateString();
                if(filter === 'monthly') return txDate.getMonth() === today.getMonth() && txDate.getFullYear() === today.getFullYear();
                if(filter === 'yearly') return txDate.getFullYear() === today.getFullYear();
                return true;
            });

            let income = 0, expense = 0;
            let catSummary = {};

            filteredTx.forEach(tx => {
                const amt = parseFloat(tx.Amount);
                if(tx.Type === 'Income') income += amt;
                else {
                    expense += amt;
                    catSummary[tx.Category] = (catSummary[tx.Category] || 0) + amt;
                }
            });

            document.getElementById('dashIncome').innerText = `฿${income.toLocaleString()}`;
            document.getElementById('dashExpense').innerText = `฿${expense.toLocaleString()}`;
            document.getElementById('dashBalance').innerText = `฿${(income - expense).toLocaleString()}`;

            const catDiv = document.getElementById('dashCategories');
            catDiv.innerHTML = '';
            if(Object.keys(catSummary).length === 0) {
                catDiv.innerHTML = '<div class="text-center text-gray-400 py-4">ไม่มีข้อมูลรายจ่าย</div>';
            } else {
                for (const [cat, amt] of Object.entries(catSummary)) {
                    const percent = ((amt / expense) * 100).toFixed(0);
                    catDiv.innerHTML += `
                        <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                            <div class="flex items-center space-x-2">
                                <div class="w-3 h-3 rounded-full bg-custom-primary"></div>
                                <span class="text-sm font-medium text-gray-700">${cat}</span>
                            </div>
                            <div class="text-sm font-bold text-gray-800">฿${amt.toLocaleString()} <span class="text-xs font-normal text-gray-400 ml-1">(${percent}%)</span></div>
                        </div>
                    `;
                }
            }
        }

        function renderCategorySettings() {
            const list = document.getElementById('settingCatList');
            list.innerHTML = '';
            currentState.categories.forEach(c => {
                const badgeColor = c.Type === 'Income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                list.innerHTML += `
                    <li class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <span class="font-medium text-gray-700">${c.Name}</span>
                        <span class="text-xs font-bold px-2 py-1 rounded-md ${badgeColor}">${c.Type === 'Income' ? 'รายรับ' : 'รายจ่าย'}</span>
                    </li>
                `;
            });
        }

        async function saveCategory() {
            const name = document.getElementById('newCatName').value;
            const type = document.getElementById('newCatType').value;
            if(!name) return;

            showLoader('กำลังเพิ่มหมวดหมู่...');
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'saveCategory', payload: { name, type } })
                });
                document.getElementById('newCatName').value = '';
                await fetchCategories(); // Refresh list
            } catch (e) { console.error(e); }
            finally { hideLoader(); }
        }

        // ==========================================
        // 🔧 HELPERS
        // ==========================================
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function showLoader(text) {
            document.getElementById('loaderText').innerText = text;
            document.getElementById('loader').classList.remove('hidden');
        }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

        // Initial Boot
        fetchCategories();

    </script>
</body>
</html>
